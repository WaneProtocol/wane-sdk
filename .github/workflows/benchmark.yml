name: Benchmark

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'benchmarks/**'
  workflow_dispatch:

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Run benchmark suite
        run: npx tsx benchmarks/index.ts || echo "Benchmark completed"
